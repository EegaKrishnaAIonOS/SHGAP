name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  node:
    name: Lint, test & build (Node apps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Python apps (ml-services, voice-service) are npm workspaces too, so they'd
      # otherwise be picked up by `turbo run` here — they're linted/tested in the
      # `python` job instead, in an environment that actually has ruff/pytest installed.
      - name: Lint
        run: npx turbo run lint --filter=!@shgap/ml-services --filter=!@shgap/voice-service

      - name: Test
        run: npx turbo run test --filter=!@shgap/ml-services --filter=!@shgap/voice-service

      - name: Build
        run: npx turbo run build --filter=!@shgap/ml-services --filter=!@shgap/voice-service

  python:
    name: Lint & test (Python services)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [ml-services, voice-service]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: apps/${{ matrix.service }}/requirements-dev.txt

      - name: Install dependencies
        working-directory: apps/${{ matrix.service }}
        run: pip install -r requirements-dev.txt

      - name: Lint
        working-directory: apps/${{ matrix.service }}
        run: ruff check .

      - name: Test
        working-directory: apps/${{ matrix.service }}
        run: pytest

  docker:
    name: Build & push images
    needs: [node, python]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # web/core-api/notification-service build via `turbo prune` (see their
          # Dockerfiles), which needs the whole monorepo as build context.
          - service: web
            context: .
            dockerfile: apps/web/Dockerfile
          - service: core-api
            context: .
            dockerfile: apps/core-api/Dockerfile
          - service: notification-service
            context: .
            dockerfile: apps/notification-service/Dockerfile
          # ml-services/voice-service are self-contained Python apps — their
          # Dockerfiles COPY relative to their own directory, so the build
          # context must be scoped to that directory too.
          - service: ml-services
            context: apps/ml-services
            dockerfile: apps/ml-services/Dockerfile
          - service: voice-service
            context: apps/voice-service
            dockerfile: apps/voice-service/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute lowercase image name
        id: image
        run: echo "repo=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image.outputs.repo }}/${{ matrix.service }}:latest
            ${{ env.REGISTRY }}/${{ steps.image.outputs.repo }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
